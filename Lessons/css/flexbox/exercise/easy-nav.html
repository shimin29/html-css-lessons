<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Navigation</title>
</head>
<style>
    body{
        margin: 0;
    }
    header{
        width: 100%;
    }
    nav{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 0 20px;
        font-size: 20px;
    }
    nav a{
        color: #fff;
        text-decoration: none;
        padding: 15px
    }
    nav a hover{
        background-color: #555;
    }
    h1{
        text-align: center;
    }
</style>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">PortFolio</a>
        <a href="#">Content</a>
    </nav>

    <h1>Easy Exercise 1 : Navigation Box</h1>
    
</body>
</html>
