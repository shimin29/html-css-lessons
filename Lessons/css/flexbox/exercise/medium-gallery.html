<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>
</head>
<style>
    body{
        font-family: Arial,  sans-serif;
        text-align: center;
    }
    h1{
        margin-top: 20px;
    }
    .gallery{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        align-items: center;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }
    .gallery img{
        margin: 10px;
        width: 120px;
        height: 120px;
        object-fit: cover;
    }
    .gallery img{
        flex: 0 0 calc(12.5%-20px);
    }
    .gallery img:nth-child(n+9){
        flex: 0 0 calc(50%-20px);
    }
</style>
<body>
    <h1>My Photo Gallery</h1>

    <div class="gallery">
        <img src="https://placehold.co/150x150" alt="1">
        <img src="https://placehold.co/150x150" alt="2">
        <img src="https://placehold.co/150x150" alt="3">
        <img src="https://placehold.co/150x150" alt="4">
        <img src="https://placehold.co/150x150" alt="5">
        <img src="https://placehold.co/150x150" alt="6">
        <img src="https://placehold.co/150x150" alt="7">
        <img src="https://placehold.co/150x150" alt="8">
        <img src="https://placehold.co/150x150" alt="9">
        <img src="https://placehold.co/150x150" alt="10">

    </div>
    
</body>
</html>
