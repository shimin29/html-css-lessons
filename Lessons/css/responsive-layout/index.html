<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Respnsive Layout</title>
        <style>
            h1::after{
                content: "-For Dekstop";
            }
            .flex-container {
                display: flex;
                flex-direction: row;
            }
            .item {
                width: 200px;
                height: 200px;
                color: white;
                border: 2px solid black;
                padding: 40px;
                margin: 20px;
            }
            .desktop-only {
                display: block;
            }
            .tablet-only{
                display: none;
            }
            .mobile-only {
                display: none;
            }

            .red {
                background-color: red;
            }
            .green {
                background-color: green;
            }
            .blue {
                background-color: blue;
            }
            h1 {
                font-size: 36px;
            }
            @media screen and (max-width: 768px) {
                .flex-container {
                    flex-direction: column;
                }
                h1 {
                    font-size: 48px;
                }
                .item {
                    padding: 10px;
                    margin: 10px;
                }
                h1::after{
                    content: "-For Tablet";

                }
                .desktop-only {
                    display: none;
                }
                .tablet-only{
                    display: block;
                }
                .mobile-only {
                    display: none;
                }
            }
            @media screen and (max-width:480px){
                .desktop-only{
                    display: none;
                }
                .tablet-only{
                    display: none;
                }
                .mobile-only{
                    display: block;
                }
                h1::after{
                    content: "-For Mobile";

                }
            }
        </style>
    </head>
    <body>
        <div class="flex-container">
            <h1>This is a heading</h1>
            <div class="item red">Item 1</div>
            <div class="item green">Item 2</div>
            <div class="item blue">Item 3</div>
            <div class="desktop-only">Dekstop Only Content</div>
            <div class="tablet-only">Tablet Only Content</div>
            <div class="mobile-only">Mobile Only Content</div>
            
        </div>
    </body>
</html>
