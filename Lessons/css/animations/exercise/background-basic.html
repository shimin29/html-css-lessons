<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Basic Background Setup</title>
        <style>
            body {
                margin: 0px;
            }
            .hero-content {
                z-index: 1;
                position: relative;
                text-align: center;
                background-color: rgba(9, 8, 8, 0.553);
                padding: 10px; 
            }
            .hero {
                background-image: url(https://cdn.audleytravel.com/1050/748/79/1015105-kuala-lumpur-cityscape.webp);
                height: 800px;
                background-size: cover;
                background-position: center;
                display: flex;
                justify-content: center;
                align-items: center;
                color: black;
                text-align: center;
                position: relative;
            }
        </style>
    </head>
    <body>
        <div class="hero">
            <div class="hero-content">
                <h1>Welcome to My Page</h1>
                <p>This is a hero section with a background image that covers the entire container and is centered</p>
            </div>
        </div>
    </body>
</html>
