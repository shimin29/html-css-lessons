<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Animations</title>
        <style>
            img {
                width: 200px;
                height: 200px;
            }
            body {
                margin: 0px;
                padding: 0px;
                color: white;
            }
            * {
                box-sizing: border-box;
            }
            .box {
                margin: 60px auto;
                width: 200px;
                height: 200px;
                background-color: black;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .box:hover {
                animation-name: changeColor;
                animation-duration: 1s;
                animation-fill-mode: forwards;
            }
            @keyframes changeColor {
                from {
                    background-color: black;
                }
                to {
                    background-color: lightblue;
                }
            }
            #my-image {
                position: absolute;
                left: 0;
                top: 100px;
                animation-name: move-image;
                animation-duration: 3s;
                animation-delay: 1s;
                animation-timing-function: ease-out;
                /* linear-the animation has the same speed from start to finish 
            ease-default value, start slow, then fast, end slow.
            ease-in- animation has a slow start
            ease-out-animation has a slow end 
            ease-in-out- animation has both slow start and slow end*/
                animation-iteration-count: infinite;
                animation-direction:alternate;
                /* animation-direction options:display:
            -normal
            -reverse
            -alternate
            -alternate-reverse
             */
            }
            @keyframes move-image{
                0%{
                    left:50%;
                }
                50%{
                    left :100%;
                }
                100%{
                    left:200%
                }
            }
        </style>
    </head>
