<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Animation On Scroll</title>
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
        <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
        <script>
            AOS.init({
                duration:1000,
                delay:100,
            });
        </script>
    </head>
    <body>
        <section class="about" data-aos="fade-left"></section>
        <section class="projects" data-aos="fade-right"></section>
        <section class="gallery" data-aos="flip-left"></section>
        <section class="contact" data-aos="flip-right"></section>
        <section class="about" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="100" data-aos-easing="ease-in-out"></section>
    </body>
</html>
