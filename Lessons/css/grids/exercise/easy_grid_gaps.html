<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grid with Gaps</title>
        <style>
            .grid-container {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                grid-auto-rows: 80px;
                grid-gap: 15px;
            }
            .grid-item {
                border: 2px solid black;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 20px;
            }
            .grid-item:nth-child(odd) {
                background-color: #e51e1e;
            }
            .grid-item:nth-child(even) {
                background-color: #fffb06;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="grid-container">
            <div class="grid-item odd">1</div>
            <div class="grid-item even">2</div>
            <div class="grid-item odd">3</div>
            <div class="grid-item even">4</div>
            <div class="grid-item odd">5</div>
            <div class="grid-item even">6</div>
            <div class="grid-item odd">7</div>
            <div class="grid-item even">8</div>
        </div>
    </body>
</html>
