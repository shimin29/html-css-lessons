            /* Partical Attribute Selector */
            /* Contain Keyword,use*= */
            a[href*="google"] {
                color: red;
                text-decoration: underline;
            }
            /* Starts with Keyword,use^= */
            img[alt^="camera"] {
                border: 1px solid white;
            }
            /* Ends with Keyword,use$= */
            a[href$="yahoo.com"] {
                color: yellow;
            }
        </style>
