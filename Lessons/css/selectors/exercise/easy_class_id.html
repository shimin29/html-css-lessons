<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Css Selectors</title>
        <style>
            h1 {
                color: blue;
                text-align: center;
            }
            button:hover {
                background-color: green;
                padding: 10px;
            }
            button:active {
                background-color: green;
                color: white;
            }
            button {
                background-color: green;
                color: white;
                border-radius: 5px;
            }
            .container p {
                background-color: lightgray;
                padding: 20px;
                border: 2px solid black;
            }
        </style>
    </head>
    <body>
        <h1>Welcome to Css Selectors</h1>
        <p>This is a demonstration of using class and ID selectors in Css.Class selectors start with a dot(.)and ID selectors start with a hash(#)</p>
        <button>Click me</button>
        <div class="container">
            <p>This is a special container styled using an ID selector .IDs should be unique on a page,while classes can be reused.</p>
        </div>
    </body>
</html>
