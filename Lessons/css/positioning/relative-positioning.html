<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Relative Positioning</title>
    </head>
    <style>
        /* Try changing top and left to different values,and inspect on your browser to see the effects */
        .box {
            position: relative;
            top: 0px;
            left: 80px;
            background-color: #f2f2f2;
            padding: 20px;
            border: 1px solid #ccc;
        }
    </style>
    <body>
        <div class="container">
            <div class="box">
                This is a box with relative positioning
            </div>
        </div>
    </body>
</html>
