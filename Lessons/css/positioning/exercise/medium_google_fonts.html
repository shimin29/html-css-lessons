<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width='device-width', initial-scale=1.0" />
        <title>Google Fonts Typography Hierarchy</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap" rel="stylesheet" />
        <style>
            h1,
            h2,
            h3,
            h4 {
                font-size: 32px;
                font-weight: 700px;
            }
            .pull-quote {
                color: rgb(120, 8, 206);
                font-size: 32px;
                font-weight: 700px;
            }

            .bitcount-grid-double-ink {
                font-family: "Bitcount Grid Double Ink", system-ui;
                font-optical-sizing: auto;
                font-weight: weight;
                font-style: normal;
                font-variation-settings:
                    "slnt" 0,
                    "CRSV" 0.5,
                    "ELSH" 0,
                    "ELXP" 0,
                    "SZP1" 0,
                    "SZP2" 0,
                    "XPN1" 0,
                    "XPN2" 0,
                    "YPN1" 0,
                    "YPN2" 0;
            }
            .bbh-bogle-regular {
                font-family: "BBH Bogle", sans-serif;
                font-weight: 400;
                font-style: normal;
            }
        </style>
    </head>
    <body>
        <article>
            <h1 class="bitcount-grid-double-ink">Main Article Title</h1>
            <p class="bbh-bogle-regular ">Article subtitle or introduction</p>

            <p>First paragraph of content...</p>

            <h2>First Section Heading</h2>
            <p>More content...</p>

            <blockquote class="pull-quote">
                <strong>This is an important pull quote from the article</strong>
            </blockquote>

            <h3>Subsection Heading</h3>
            <p>Additional content...</p>

            <h4>Minor Heading</h4>
            <p>Final content section...</p>
        </article>
    </body>
</html>
