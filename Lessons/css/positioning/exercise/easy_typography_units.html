<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Basic Typography Units</title>
        <style>
            .body {
                font-size: 16px;

            }
            .container {
                background-color: lightgray;
                padding: 20px;
                line-height: 1.6;
                max-width: 700px;
            }
            .main-heading {
                font-size: 36px;
                border-bottom: 2px solid #333;
                padding-bottom: 10px;
            }
            .body-text {
                font-size: 1rem;
                color: #333;
                line-height: 1.6;
            }
            .highlight {
                font-size: 2em;
                color: #e74c3c;
                background-color: lightpink;
                padding: 5px;
                display: inline-block;
                line-height: 1;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="main-heading">Main Heading with Pixels</h1>
            <h2>Subheading with Ems</h2>
            <p>Body text using rems...</p>
            <p>Text with <span class="highlight">highlighted content</span> using ems.</p>
        </div>
    </body>
</html>
