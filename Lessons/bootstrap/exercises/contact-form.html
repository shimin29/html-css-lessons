<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact Form with Bootstrap</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </head>
    <body>
        <h1 class="text-center py-4">Contact Us</h1>

        <div class="container">
            <form>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter Your Name" />
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your Email" />
                </div>

                <div class="form-group">
                    <label for="Subject">Subject</label>
                    <input type="text" class="form-control" id="Subject" placeholder="Enter Subjects" />
                </div>

                <div class="form-group">
                    <label for="message" class="form-group">Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Write your message"></textarea>
                </div>

                <div class="form-group">
                    <label for="referral" class="form-group">How did you hear about us?</label>
                    <select class="form-select" id="referral">
                        <option selected disabled>Select an option</option>
                        <option value="social">Social Media</option>
                        <option value="friend">Friend/Family</option>
                        <option value="search">Search Engine</option>
                    </select>
                </div>

                <div class="d-flex justify-content-center py-3">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Contact Information</h5>
                        <p class="card-text">
                            <strong>Address:</strong> 123 Main Street, City, Country<br />
                            <strong>Phone:</strong> +123 456 7890<br />
                            <strong>Email:</strong> info@example.com
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </body>
</html>
