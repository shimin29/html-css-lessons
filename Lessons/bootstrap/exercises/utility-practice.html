<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Utility Classes Pratice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container text-center mt-5">
        <h1 class="mb-4">Bootstrap Utility Classes</h1>
        <p class="text-primary fw-bold text-center">This paragraph has blue text, is bold, and is centered.</p>
        <p class="bg-success text-white p-3 text-start">This paragraph has a green background, white text, and padding of size 3.</p>
        <p class="bg-secondary text-end mt-4 ">This paragraph has a gray background, right-aligned text, and margin-top of size 4.</p>

        <div class="text-center mt-3">
            <button class="btn btn-primary">Centered Button</button>
        </div>

        <div class="shadow p-3 mt-4 text-start">This div has a shadow and contains some text.</div>

    </div>
</body>
</html>
